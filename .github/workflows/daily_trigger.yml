name: Daily News Pipeline Trigger

on:
  schedule:
    # Run at 07:00 UTC every day.
    - cron: '0 7 * * *'
  # Manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call External Trigger Endpoint
        run: |
          echo "Triggering pipeline on Render..."
          curl -X POST https://daily-news-bot-admin.onrender.com/trigger_run
          echo "Trigger request sent."
